{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Data Analytics</h2>

    <div class="card mb-3 p-3">
        <h5>Загрузка файлов .msgpk</h5>
        <form action="/analytics/upload_msgs" method="post" enctype="multipart/form-data"
              class="row g-2 align-items-center">
            <div class="col-md-10">
                <input type="file" name="msg_files" multiple accept=".msgpk,.msg,.bin" class="form-control">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Загрузить</button>
            </div>
        </form>

        {% if status.msgpk_count > 0 %}
        <p class="mt-2 text-muted">Загружено файлов: {{ status.msgpk_count }}</p>
        {% endif %}
    </div>

    <div class="d-flex justify-content-between mb-3">
        <form action="/analytics/run_compute" method="post">
            <button class="btn btn-success">Выполнить расчёт</button>
        </form>
    </div>

    {% if has_results %}
    <hr>
    <h4>Результаты расчёта</h4>
    <div class="row">
        {% for g in graphs %}
        <div class="col-md-6 mb-4">
            <img src="data:image/png;base64,{{ g }}" class="img-fluid rounded shadow">
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
