{% extends "base.html" %}
{% block content %}
<div class="container mt-3">
    <h2 class="mb-3">Separatrix</h2>

    <div class="card p-3 mb-2">
        <h6 class="mb-2">Загрузка .json файла</h6>
        <form action="/separatrix/upload" method="post" enctype="multipart/form-data" class="row g-2 mb-1">
            <div class="col-md-7">
                <input id="fileInput" type="file" name="file" accept=".json" class="form-control form-control-sm">
            </div>
            <div class="col-md-3">
                <input id="selectedFilenameDisplay" type="text" class="form-control form-control-sm" readonly
                       value="{{ filename if filename else 'Файл не выбран' }}">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100 btn-sm" type="submit">Загрузить</button>
            </div>
        </form>

        {% if filename %}
        <div class="mt-2">
            <input type="hidden" id="init-filename" value="{{ filename }}">

            {% if times_ms and times_ms | length > 0 %}
            {% set first = times_ms[0] | int %}
            {% set last = times_ms[-1] | int %}

            <div class="row g-2 align-items-center mt-1">
                <div class="col-md-8">
                    <label class="form-label mb-1">Время (ms)</label>
                    <input type="range" id="timeSlider" class="form-range"
                           min="{{ first }}" max="{{ last }}"
                           step="{{ time_step }}" value="{{ first }}">
                </div>

                <div class="col-md-2">
                    <label class="form-label mb-1">Текущее</label>
                    <div id="timeLabel" class="fw-bold">{{ first }} ms</div>
                </div>
            </div>

            {% endif %}
        </div>
        {% endif %}
    </div>

    <div class="card p-2 mt-2">

        <!-- кнопка сохранения PNG -->
        <div class="text-end mb-1">
            <button class="btn btn-secondary btn-sm" onclick="saveSeparatrix()">Сохранить PNG</button>
        </div>

        <!-- график -->
        <div id="plot" style="background:white; display:block; margin:0; max-width:100%;"></div>

        <noscript>
            {% if plot_html %}
            <div class="mt-3">
                <small class="text-muted">Server-side plot (fallback):</small>
                {{ plot_html | safe }}
            </div>
            {% endif %}
        </noscript>
    </div>
</div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<script>
    (function() {

        // --- SAVE PNG FUNCTION ---
        window.saveSeparatrix = function() {
            const plotDiv = document.getElementById("plot");
            if (!plotDiv) return;

            const t = document.getElementById("timeSlider")?.value || "time";


            const width = plotDiv.clientWidth;
            const height = plotDiv.clientHeight;


            const qualityScale = 3;

            Plotly.downloadImage(plotDiv, {
                format: "png",
                filename: `separatrix_${t}ms`,
                width: width,
                height: height,
                scale: qualityScale
            });
        };



        // --- ORIGINAL CODE WITH IMPROVED STYLE ---
        const STORAGE_KEY = 'separatrix_state_v1';

        const filenameInputEl = document.getElementById('fileInput');
        const selectedFilenameDisplay = document.getElementById('selectedFilenameDisplay');

        if (filenameInputEl && selectedFilenameDisplay) {
            filenameInputEl.addEventListener('change', (e) => {
                const fi = e.target;
                selectedFilenameDisplay.value = fi.files?.[0]?.name || 'Файл не выбран';
            });
        }

        const filenameInitInput = document.getElementById('init-filename');
        if (!filenameInitInput) return;

        const filename = filenameInitInput.value;
        const slider = document.getElementById('timeSlider');
        const label = document.getElementById('timeLabel');
        const plotDiv = document.getElementById('plot');

        const x_range = [0.0, 0.62];
        const y_range = [-0.55, 0.55];

        const span_x = x_range[1] - x_range[0];
        const span_y = y_range[1] - y_range[0];

        const markerX = Array(6).fill(0.24);
        const markerY = [-0.371, -0.386, -0.399, -0.41, -0.422, -0.432];

        let lastRelayoutEvent = null;

        function loadSavedState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const st = JSON.parse(raw);
                if (!st) return null;
                if (st.filename !== filename) return null;
                return st;
            } catch {
                return null;
            }
        }

        function saveState() {
            try {
                const st = {
                    filename: filename,
                    time: slider ? slider.value : null,
                    relayout: lastRelayoutEvent || null,
                    savedAt: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
            } catch {}
        }

        function applyRelayoutEvent(relayoutObj) {
            if (!relayoutObj || !plotDiv) return;
            Plotly.relayout(plotDiv, relayoutObj)
                .catch(() => {});
        }

        function drawSeparatrix(data, restoreRelayout) {
            const traces = [];
            if (data.body) {
                traces.push({ x: data.body.R, y: data.body.Z, mode: 'lines', line: { color: 'black', width: 3 }, showlegend: false });
            }
            if (data.leg_1) {
                traces.push({ x: data.leg_1.R, y: data.leg_1.Z, mode: 'lines', line: { color: 'black', width: 3 }, showlegend: false });
            }
            if (data.leg_2) {
                traces.push({ x: data.leg_2.R, y: data.leg_2.Z, mode: 'lines', line: { color: 'black', width: 3 }, showlegend: false });
            }

            traces.push({
                x: markerX,
                y: markerY,
                mode: 'markers',
                marker: { color: '#d62728', size: 5, symbol: 'circle', opacity: 0.95 },
                showlegend: false,
                hoverinfo: 'y'
            });

            const targetHeight = 500;
            const targetWidth = Math.round(targetHeight * (span_x / span_y));

            plotDiv.style.width = targetWidth + 'px';
            plotDiv.style.height = targetHeight + 'px';
            plotDiv.style.marginLeft = '0';
            plotDiv.style.marginRight = 'auto';

            const layout = {
                title: { text: `t=${Math.round(data.requested_time_ms)} ms`, font: { size: 24 } },
                xaxis: { title: { text: 'R [м]', font: { size: 20 } }, tickfont: { size: 16 }, range: x_range, autorange: false, fixedrange: true, showgrid: true, gridcolor: '#e6e6e6' },
                yaxis: { title: { text: 'Z [м]', font: { size: 20 } }, tickfont: { size: 16 }, range: y_range, autorange: false, fixedrange: true, showgrid: true, gridcolor: '#e6e6e6', scaleanchor: 'x', scaleratio: 1 },
                autosize: false,
                width: targetWidth,
                height: targetHeight,
                plot_bgcolor: 'white',
                paper_bgcolor: 'white',
                margin: { l: 70, r: 30, t: 60, b: 60 },
                showlegend: false,
                uirevision: 'fixed'
            };

            Plotly.react(plotDiv, traces, layout, { displayModeBar: false, responsive: true })
                .then(() => {
                    if (restoreRelayout && restoreRelayout.relayout)
                        applyRelayoutEvent(restoreRelayout.relayout);
                    if (!plotDiv._hasRelayoutListener) {
                        plotDiv.on('plotly_relayout', ev => {
                            lastRelayoutEvent = ev;
                            saveState();
                        });
                        plotDiv._hasRelayoutListener = true;
                    }
                });
        }

        let debounceTimer = null;
        function scheduleFetch(t, restoreRelayout) {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                fetch(`/separatrix/data?filename=${encodeURIComponent(filename)}&time_ms=${encodeURIComponent(t)}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data || data.error) return;
                        drawSeparatrix(data, restoreRelayout);
                        if (label) label.textContent = `${Math.round(data.requested_time_ms)} ms`;
                        saveState();
                    });
            }, 70);
        }

        const saved = loadSavedState();
        if (saved && slider) {
            if (saved.time !== null && saved.time !== undefined) {
                const min = Number(slider.min);
                const max = Number(slider.max);
                let tv = Number(saved.time);
                if (!isNaN(min) && tv < min) tv = min;
                if (!isNaN(max) && tv > max) tv = max;
                slider.value = tv;
                label.textContent = `${tv} ms`;
            }
        }

        if (slider) {
            scheduleFetch(slider.value, saved);
            slider.addEventListener('input', e => {
                const t = e.target.value;
                label.textContent = `${t} ms`;
                scheduleFetch(t, null);
            });
        } else {
            const t = (saved && saved.time) ? saved.time : 0;
            scheduleFetch(t, saved);
        }

        window.addEventListener('beforeunload', saveState);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                saveState();
            } else {
                setTimeout(() => {
                    if (plotDiv && plotDiv.data && plotDiv.data.length > 0) {
                        Plotly.Plots.resize(plotDiv);
                        const s = loadSavedState();
                        if (s && s.relayout) {
                            applyRelayoutEvent(s.relayout);
                            lastRelayoutEvent = s.relayout;
                        }
                    }
                }, 120);
            }
        });

    })();
</script>

{% endblock %}
